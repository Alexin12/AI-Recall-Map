name: e2e

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies supabase/migrations automatically)
        run: supabase start

      - name: Export Supabase connection details
        run: supabase status -o env >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v5
        with:
          working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright's Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Backend pytest
        working-directory: backend
        env:
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
        run: uv run pytest

      - name: Frontend e2e (Playwright)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          CI: true
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
